name: docker

on:
  push:
    branches: [master]
    paths:
      - Dockerfile
      - .dockerignore
      - package.json
      - package-lock.json
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - package.json
      - package-lock.json

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build Docker image
        run: docker build -t lint-md-test .

      - name: Smoke test - stdin lint
        run: echo "# Hello" | docker run -i lint-md-test --stdin

      - name: Smoke test - file lint
        run: docker run --rm -v ${{ github.workspace }}/examples:/docs lint-md-test /docs/
